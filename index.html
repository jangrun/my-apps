<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Apps</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: #f5f1e8;
        color: #1f1a14;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(201, 149, 69, 0.22), transparent 40%),
          linear-gradient(180deg, #fbf8f2 0%, #efe5d3 100%);
      }

      main {
        width: min(560px, calc(100% - 48px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 20px 60px rgba(64, 42, 16, 0.12);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 14px 20px;
        border-radius: 999px;
        background: #1f1a14;
        color: #fffaf2;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        background: #3a2c1b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>My Apps</h1>
      <p>아래 링크를 통해 `time-dial` 앱 페이지로 이동할 수 있습니다.</p>
      <a href="./time-dial/">time-dial 열기</a>
    </main>
  </body>
</html>
